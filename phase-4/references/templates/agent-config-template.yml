---
# Foundry Agent Configuration Template
# Copy this to: ./<project-slug>/agents/<project-name>/agent.yml
# Fill in [PLACEHOLDERS] specific to your dashboard

name: [agent-name]                    # kebab-case, e.g., dashboard-churn-analyzer
description: |
  AI agent for [DASHBOARD_PURPOSE]. Answers questions like:
  - "What's driving [KEY_METRIC] trend?"
  - "Break down [METRIC] by [DIMENSION]"
  - "Show me anomalies in [TIME_PERIOD]"

# Model name — MUST be Foundry format (NOT Claude API format)
# Foundry format:   claude-opus-4-6, claude-4.5-sonnet
# Claude API format: claude-opus-4-8, claude-sonnet-4-6 ← DO NOT USE
model: claude-opus-4-6

# Tool configuration for agent
tools:
  - type: query_engine
    name: query_tables
    config:
      database: [SINK_DATABASE]
      max_rows: 10000
      timeout_seconds: 60

# Maximum reasoning iterations before returning answer
max_iterations: 10

# Knowledge bases the agent has access to
# Each .yml file in knowledge_bases/ becomes a KB reference
knowledge_bases:
  - name: sink_[TABLE_NAME]            # One per SINK table, e.g., sink_sales_revenue
  - name: business_context
  - name: metrics_dictionary
  - name: sql_templates

# Foundry Treasure Data configuration
treasure_data:
  api_endpoint: "https://api.treasuredata.com"
  # API key will be injected at deployment time from credentials
